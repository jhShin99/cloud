<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="/js/common.js"></script>
</head>
<body>
<div class="flex-center mt-10">
  <div><img src="/img/logo.png" class="login-join-logo" onclick="goMain()"></div>
  <div>
    <h1 class="ml-1 lightblue pointer" onclick="goMain()">CLOUD</h1>
  </div>
</div>
<div class="flex-center">
  <div class="join-box">
    <form action="/user/join" method="post">
      <div><input type="text" id="username" name="username" class="input-box" placeholder="아이디"></div>
      <div><input type="password" id="password" name="password" class="input-box" placeholder="비밀번호"></div>
      <div><input type="text" id="name" name="name" class="input-box" placeholder="이름"></div>
      <!--/*@thymesVar id="notNull" type="com"*/-->
      <div th:if="${notNull}" th:text="${notNull}" class="mb-1 red"></div>
      <!--/*@thymesVar id="existUsername" type="com"*/-->
      <div th:if="${existUsername}" th:text="${existUsername}" class="mb-1 red"></div>
      <div><input type="submit" class="input-box" value="회원가입"></div>
    </form>
  </div>
</div>
</body>
</html>
