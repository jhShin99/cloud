<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/css/common.css">
  <script src="/js/common.js"></script>
</head>
<body>
<div class="flex-center mt-10">
  <div><img src="/img/logo.png" class="logo"></div>
  <div>
    <h1 class="ml-1 lightblue pointer" onclick="goMain()">CLOUD</h1>
  </div>
</div>
<div class="flex-center">
  <div class="join-box">
    <form action="/user/join" th:object="${user}" method="post">
      <div><input type="text" id="username" name="username" class="input-box" placeholder="아이디"></div>
      <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
      <div><input type="password" id="password" name="password" class="input-box" placeholder="비밀번호"></div>
      <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      <div><input type="text" id="name" name="name" class="input-box" placeholder="이름"></div>
      <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
      <!--/*@thymesVar id="errorMessage" type="com"*/-->
      <div th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></div>
      <div><input type="submit" class="input-box" value="회원가입"></div>
    </form>
  </div>
</div>
</body>
</html>
