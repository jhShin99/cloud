<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+NZ+Guides&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="/js/common.js"></script>
  <title>Document</title>
</head>
<body>
<div th:replace="~{fragments/fragments :: header}"></div>
<div class="main-container">
  <div th:replace="~{fragments/fragments :: nav}"></div>
  <div class="main">
    <div class="main-content mt-3">
      <div class="board-header">
        <h1 class="mb-1" style="color: cornflowerblue">자유게시판</h1>
        <hr class="mb-1 hr">
      </div>
      <form action="/board/write" method="post">
        <div class="board-write-body">
          <label for="title">제목</label>
          <input type="text" id="title" name="title" class="board-name mb-1">
          <input type="hidden" id="userId" name="userId" value="admin">
          <label for="content">내용</label>
          <textarea class="resize-none" id="content" name="content" cols="30" rows="30"></textarea>
        </div>
        <div class="board-footer">
          <button type="button" class="undo-button mr-05" onclick="undoBoardWrite()">취소</button>
          <button type="submit" class="execute-button">등록</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
