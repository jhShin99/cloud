<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="/js/common.js"></script>
  <title>Document</title>
</head>
<body>
<div th:replace="~{fragments/fragments :: header}"></div>
<div class="main-container">
  <div th:replace="~{fragments/fragments :: nav}"></div>
  <div class="main">
    <div class="main-content mt-3">
      <div class="board-header">
        <h1 class="mb-1 cornflowerblue pointer" onclick="goBoardList()">자유게시판</h1>
        <hr class="mb-1 hr">
      </div>
      <form action="/board/write" method="post" onsubmit="return confirmWrite()">
        <div class="board-write-body">
          <label for="title"></label>
          <input type="text" placeholder="제목을 입력해 주세요." id="title" name="title" class="board-name mb-1">
          <input type="hidden" id="userId" name="userId" th:value="${session.loginUser.username}">
          <label for="content"></label>
          <textarea placeholder="내용을 입력해 주세요." class="resize-none" id="content" name="content" cols="30" rows="30"></textarea>
        </div>
        <div class="board-footer">
          <button type="button" class="undo-button mr-05" onclick="undoBoardWrite()">취소</button>
          <button type="submit" class="execute-button">등록</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
