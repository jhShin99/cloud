<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/common.css">
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <script src="/js/common.js"></script>
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <title>Document</title>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="main-container">
  <div class="main">
    <div class="main-content mt-3">
      <div class="board-header">
        <h1 class="mb-1 cornflowerblue pointer" onclick="goBoardList()">자유게시판</h1>
        <hr class="mb-1 hr">
      </div>
      <form action="/board/update" method="post" onsubmit="return confirmUpdate()">
        <div class="board-write-body">
          <input type="hidden" id="id" name="id" th:value="${board.id}">
          <label for="title"></label>
          <input type="text" placeholder="제목을 입력해 주세요." id="title" name="title" th:value="${board.title}" class="board-name mb-1">
          <input type="hidden" id="userId" name="userId" value="admin">
          <input type="hidden" name="content" id="content">
          <div id="editor"></div>
        </div>
        <div class="board-footer">
          <button type="button" class="undo-button mr-05" onclick="history.back()">취소</button>
          <button type="submit" class="execute-button">저장</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script th:inline="javascript">
  const editor = new toastui.Editor({
    el: document.querySelector('#editor'),
    height: '600px',
    initialEditType: 'wysiwyg',
    initialValue: /*[[${board.content}]]*/ ''
  });
</script>
</body>
</html>
